server {
    listen 80;
    server_name bgfactory.yourdomain.com;
    # Replace bgfactory.yourdomain.com with your actual domain or subdomain
    # If no domain, use: server_name 148.230.66.71;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Max upload size (for file uploads)
    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:3003;
        proxy_http_version 1.1;

        # WebSocket support (for live telemetry & SSE)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';

        # Forward real client info
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;

        # Long timeout for AI streaming responses
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
    }

    # Cache static assets
    location /_next/static {
        proxy_pass http://127.0.0.1:3003;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }
}
